<!DOCTYPE html>
<html>
<head>
    <title>Stickman Adventure</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; background: #eee; margin: 20px auto; border: 5px solid #555; }
        .controls { text-align: center; }
    </style>
</head>
<body>
    <div class="controls">
        <h2>Stickman Quest: Reach the Boss</h2>
        <p>ARROWS to move | SPACE to jump | R to switch weapon</p>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game State
let level = 1;
const gravity = 0.5;

// Player Object
const player = {
    x: 50, y: 300,
    width: 20, height: 40,
    vx: 0, vy: 0,
    grounded: false,
    weapon: 'None',
    frame: 0,
    inventory: ['Hands']
};

// Platforms (Level design)
let platforms = [
    {x: 0, y: 350, w: 800, h: 50}, // Floor
    {x: 300, y: 250, w: 100, h: 20},
    {x: 500, y: 180, w: 100, h: 20}
];

// Items
let items = [{x: 520, y: 150, type: 'Sword', collected: false}];

function update() {
    // Movement
    if (keys['ArrowRight']) { player.vx = 3; player.frame += 0.2; }
    else if (keys['ArrowLeft']) { player.vx = -3; player.frame += 0.2; }
    else { player.vx *= 0.8; player.frame = 0; }

    if (keys['ArrowUp'] && player.grounded) {
        player.vy = -10;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Collision Logic
    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.width > p.x &&
            player.y + player.height > p.y && player.y + player.height < p.y + p.h) {
            player.grounded = true;
            player.vy = 0;
            player.y = p.y - player.height;
        }
    });

    // Collect Items
    items.forEach(item => {
        if (!item.collected && Math.abs(player.x - item.x) < 20 && Math.abs(player.y - item.y) < 20) {
            item.collected = true;
            player.inventory.push(item.type);
            player.weapon = item.type;
        }
    });

    // Screen Switch (New Challenge)
    if (player.x > canvas.width) {
        nextLevel();
    }
}

function drawStickman() {
    const walk = Math.sin(player.frame) * 10;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;

    // Head
    ctx.beginPath();
    ctx.arc(player.x + 10, player.y, 8, 0, Math.PI * 2);
    ctx.stroke();

    // Body
    ctx.moveTo(player.x + 10, player.y + 8);
    ctx.lineTo(player.x + 10, player.y + 25);

    // Legs
    ctx.lineTo(player.x + 10 + walk, player.y + 40); // Leg 1
    ctx.moveTo(player.x + 10, player.y + 25);
    ctx.lineTo(player.x + 10 - walk, player.y + 40); // Leg 2

    // Arms
    ctx.moveTo(player.x + 10, player.y + 15);
    ctx.lineTo(player.x + 10 + (player.vx * 2), player.y + 25);
    
    ctx.stroke();

    // Draw Weapon
    if (player.weapon !== 'Hands') {
        ctx.fillStyle = player.weapon === 'Sword' ? 'silver' : 'brown';
        ctx.fillRect(player.x + 15, player.y + 10, 20, 5);
        ctx.fillText(player.weapon, player.x, player.y - 15);
    }
}

function nextLevel() {
    level++;
    player.x = 10;
    // Generate new obstacles randomly
    platforms = [{x: 0, y: 350, w: 800, h: 50}];
    for(let i=0; i<3; i++) {
        platforms.push({x: Math.random()*600, y: 100 + Math.random()*200, w: 100, h: 20});
    }
    // Occasionally drop an axe
    if (level % 2 === 0) items.push({x: 400, y: 200, type: 'Axe', collected: false});
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Level Text
    ctx.fillStyle = "#555";
    ctx.fillText("Level: " + level, 20, 30);
    ctx.fillText("Weapon: " + player.weapon, 20, 50);

    // Draw Platforms
    ctx.fillStyle = '#888';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // Draw Items
    items.forEach(item => {
        if (!item.collected) {
            ctx.fillStyle = 'gold';
            ctx.beginPath(); ctx.arc(item.x, item.y, 5, 0, 7); ctx.fill();
        }
    });

    drawStickman();
    update();
    requestAnimationFrame(render);
}

// Input Handling
const keys = {};
window.onkeydown = (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyR') {
        let idx = player.inventory.indexOf(player.weapon);
        player.weapon = player.inventory[(idx + 1) % player.inventory.length];
    }
};
window.onkeyup = (e) => keys[e.code] = false;

render();
</script>
</body>
</html>
