<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Stickman HTML Adventure</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; color:#fff; }
  canvas { display:block; margin:0 auto; background:#111; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    pointer-events: none;
  }
  #instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 10px 20px;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div id="ui">
  <div>Health: <span id="health">100</span></div>
  <div>Weapon: <span id="weapon">none</span></div>
  <div>Level: <span id="level">1</span></div>
</div>

<div id="instructions">
  ← → = move    SPACE = jump    UP/DOWN = climb    R = switch weapon    F = attack
</div>

<canvas id="c"></canvas>

<script>
// =============================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

let cameraX = 0;
let currentLevel = 1;
let gameOver = false;
let youWin = false;

// Input
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

// Player
const player = {
  x: 80,
  y: 400,
  w: 24,
  h: 60,
  vx: 0,
  vy: 0,
  onGround: false,
  climbing: false,
  facing: 1,
  legAngle: 0,
  armAngle: 0,
  animTimer: 0,
  weapons: [],
  currentWeapon: null,
  health: 100
};

// Levels data
const levels = [
  // Level 1 - simple platforms
  {
    endX: 1800,
    platforms: [
      {x:200, y:480, w:300, h:20, climb:false},
      {x:600, y:380, w:180, h:20, climb:false},
      {x:950, y:280, w:140, h:20, climb:true},
      {x:1300,y:420, w:220, h:20, climb:false}
    ],
    weapons: [
      {x:980, y:240, type:'sword', taken:false}
    ],
    boss: null
  },
  // Level 2
  {
    endX: 2200,
    platforms: [
      {x:300, y:460, w:160, h:20, climb:false},
      {x:580, y:340, w:200, h:20, climb:true},
      {x:950, y:220, w:120, h:20, climb:false},
      {x:1300,y:380, w:180, h:20, climb:false},
      {x:1700,y:300, w:140, h:20, climb:true}
    ],
    weapons: [
      {x:600, y:300, type:'axe', taken:false},
      {x:1750,y:260, type:'sword', taken:false}
    ],
    boss: null
  },
  // Level 3 - with boss
  {
    endX: 2600,
    platforms: [
      {x:400, y:480, w:250, h:20, climb:false},
      {x:800, y:360, w:180, h:20, climb:true},
      {x:1200,y:240, w:160, h:20, climb:false},
      {x:1700,y:400, w:200, h:20, climb:false},
      {x:2100,y:320, w:140, h:20, climb:true}
    ],
    weapons: [
      {x:1250,y:200, type:'axe', taken:false}
    ],
    boss: {x:2400, y:380, w:60, h:100, health:120, vx:1.2}
  }
];

let level = levels[0];

// Game loop
function loop() {
  if (gameOver || youWin) {
    drawEndScreen();
    return;
  }

  update();
  draw();
  requestAnimationFrame(loop);
}

function update() {
  // Movement
  player.vx = 0;
  if (keys['arrowleft'] || keys['a']) { player.vx = -4; player.facing = -1; }
  if (keys['arrowright']|| keys['d']) { player.vx =  4; player.facing =  1; }

  // Jump
  if ((keys[' '] || keys['w']) && player.onGround && !player.climbing) {
    player.vy = -13;
    player.onGround = false;
  }

  // Gravity
  if (!player.climbing) player.vy += 0.65;

  // Climbing
  player.climbing = false;
  for (let p of level.platforms) {
    if (p.climb && collides(player, p)) {
      if (keys['arrowup'] || keys['w']) {
        player.y -= 4;
        player.vy = 0;
        player.climbing = true;
      }
      if (keys['arrowdown']|| keys['s']) {
        player.y += 4;
        player.climbing = true;
      }
    }
  }

  // Apply movement
  player.x += player.vx;
  player.y += player.vy;

  // Ground / platform collision
  player.onGround = false;
  for (let p of level.platforms) {
    if (!p.climb && collides(player, p) && player.vy >= 0) {
      if (player.y + player.h > p.y && player.y + player.h - player.vy <= p.y) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  if (player.y > canvas.height - player.h) {
    player.y = canvas.height - player.h;
    player.vy = 0;
    player.onGround = true;
  }

  // Pick up weapons
  for (let w of level.weapons) {
    if (!w.taken && dist(player.x+12, player.y+30, w.x, w.y) < 35) {
      w.taken = true;
      player.weapons.push(w.type);
      if (!player.currentWeapon) player.currentWeapon = w.type;
      document.getElementById('weapon').textContent = player.currentWeapon || 'none';
    }
  }

  // Switch weapon
  if (keys['r']) {
    keys['r'] = false; // prevent holding
    if (player.weapons.length > 1) {
      let idx = player.weapons.indexOf(player.currentWeapon);
      player.currentWeapon = player.weapons[(idx + 1) % player.weapons.length];
      document.getElementById('weapon').textContent = player.currentWeapon;
    }
  }

  // Attack boss
  if (keys['f'] && level.boss) {
    keys['f'] = false;
    if (player.currentWeapon && Math.abs(player.x - level.boss.x) < 80 && Math.abs(player.y - level.boss.y) < 100) {
      level.boss.health -= 12;
      if (level.boss.health <= 0) {
        youWin = true;
      }
    }
  }

  // Boss movement & damage
  if (level.boss) {
    if (level.boss.x > player.x + 20) level.boss.x -= level.boss.vx;
    if (level.boss.x < player.x - 20) level.boss.x += level.boss.vx;

    if (collides(player, level.boss)) {
      player.health -= 0.4;
      document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
      if (player.health <= 0) gameOver = true;
    }
  }

  // Level progression
  if (player.x > level.endX) {
    currentLevel++;
    if (currentLevel > levels.length) {
      youWin = true;
      return;
    }
    level = levels[currentLevel-1];
    player.x = 80;
    player.y = 400;
    cameraX = 0;
    document.getElementById('level').textContent = currentLevel;
  }

  // Camera
  if (player.x - cameraX > canvas.width * 0.6) {
    cameraX = player.x - canvas.width * 0.6;
  }
  if (player.x - cameraX < canvas.width * 0.3) {
    cameraX = player.x - canvas.width * 0.3;
  }
  cameraX = Math.max(0, cameraX);

  // Animation
  if (player.vx !== 0 || player.climbing) {
    player.animTimer += 0.18;
    player.legAngle = Math.sin(player.animTimer) * 35;
    player.armAngle = -player.legAngle * 0.7;
  } else {
    player.legAngle = player.armAngle = 0;
  }
}

// Collision helper (AABB)
function collides(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function dist(x1,y1,x2,y2) {
  const dx = x1-x2, dy = y1-y2;
  return Math.sqrt(dx*dx + dy*dy);
}

function draw() {
  ctx.fillStyle = "#0a1421";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Ground
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height-2);
  ctx.lineTo(canvas.width, canvas.height-2);
  ctx.stroke();

  ctx.save();
  ctx.translate(-cameraX, 0);

  // Platforms
  for (let p of level.platforms) {
    ctx.fillStyle = p.climb ? "#1a5c8c" : "#2a7c3c";
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  // Weapons on ground
  for (let w of level.weapons) {
    if (!w.taken) {
      ctx.strokeStyle = w.type==='sword' ? "#c44" : "#4c4";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(w.x, w.y);
      ctx.lineTo(w.x, w.y-40);
      ctx.stroke();
      if (w.type==='axe') {
        ctx.fillStyle = "#4c4";
        ctx.beginPath();
        ctx.arc(w.x, w.y-40, 8, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // Boss
  if (level.boss) {
    ctx.fillStyle = "#a22";
    ctx.fillRect(level.boss.x, level.boss.y, level.boss.w, level.boss.h);
    // health bar
    ctx.fillStyle = "#f44";
    ctx.fillRect(level.boss.x, level.boss.y-20, level.boss.health*0.5, 10);
  }

  // Player (stickman)
  const px = player.x + 12;
  const py = player.y;

  ctx.strokeStyle = "#eee";
  ctx.lineWidth = 4;

  // head
  ctx.beginPath();
  ctx.arc(px, py-18, 12, 0, Math.PI*2);
  ctx.stroke();

  // body
  ctx.beginPath();
  ctx.moveTo(px, py-6);
  ctx.lineTo(px, py+36);
  ctx.stroke();

  // legs
  const legLen = 28;
  ctx.beginPath();
  ctx.moveTo(px, py+36);
  ctx.lineTo(px + Math.cos(player.legAngle*Math.PI/180)*legLen * player.facing,
               py+36 + Math.sin(player.legAngle*Math.PI/180)*legLen);
  ctx.moveTo(px, py+36);
  ctx.lineTo(px + Math.cos(-player.legAngle*Math.PI/180)*legLen * player.facing,
               py+36 + Math.sin(-player.legAngle*Math.PI/180)*legLen);
  ctx.stroke();

  // arms
  const armLen = 24;
  ctx.beginPath();
  ctx.moveTo(px, py+6);
  ctx.lineTo(px + Math.cos(player.armAngle*Math.PI/180)*armLen * player.facing,
               py+6 + Math.sin(player.armAngle*Math.PI/180)*armLen);
  ctx.moveTo(px, py+6);
  ctx.lineTo(px + Math.cos(-player.armAngle*Math.PI/180)*armLen * player.facing,
               py+6 + Math.sin(-player.armAngle*Math.PI/180)*armLen);
  ctx.stroke();

  // Weapon in hand
  if (player.currentWeapon) {
    const handX = px + Math.cos(player.armAngle*Math.PI/180)*armLen * player.facing;
    const handY = py+6 + Math.sin(player.armAngle*Math.PI/180)*armLen;
    ctx.strokeStyle = player.currentWeapon==='sword' ? "#e44" : "#4e4";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(handX, handY);
    ctx.lineTo(handX + 38 * player.facing, handY);
    ctx.stroke();

    if (player.currentWeapon === 'axe') {
      ctx.fillStyle = "#4e4";
      ctx.beginPath();
      ctx.arc(handX + 38 * player.facing, handY, 9, 0, Math.PI*2);
      ctx.fill();
    }
  }

  ctx.restore();

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#f44";
    ctx.font = "60px Arial";
    ctx.textAlign = "center";
    ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
  }
  if (youWin) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#4f4";
    ctx.font = "60px Arial";
    ctx.textAlign = "center";
    ctx.fillText("YOU WIN!", canvas.width/2, canvas.height/2);
  }
}

function drawEndScreen() {
  // already handled in draw()
}

// Start
loop();
</script>
</body>
</html>
